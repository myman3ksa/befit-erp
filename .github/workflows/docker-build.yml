name: Build and Deploy to Docker Hub

# This workflow will trigger on every push to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out your GitHub repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx for faster and more feature-rich builds
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub (or any other container registry)
      # You need to set your DOCHERHUB_USERNAME and DOCKERHUB_TOKEN in your GitHub repo secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build your Dockerfile and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Replace 'your-dockerhub-username/befit-erp:latest' with your desired image name
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/befit-erp:latest
